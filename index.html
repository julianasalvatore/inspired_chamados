<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abertura de Chamado - Suporte TI</title>

<!-- Fonte Moderna -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   BODY
========================= */

body{
    font-family:'Inter',sans-serif;

    background:
        linear-gradient(
            135deg,
            #0f172a 0%,
            #1e293b 100%
        );

    min-height:100vh;

    padding:40px 20px;

    color:#1e293b;
}

/* =========================
   CONTAINER
========================= */

.container{

    max-width:950px;

    margin:auto;

    background:#ffffff;

    border-radius:24px;

    padding:40px;

    position:relative;

    overflow:hidden;

    box-shadow:
        0 25px 60px rgba(0,0,0,.18);
}

.container::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:8px;

    background:
        linear-gradient(
            90deg,
            #2563eb,
            #38bdf8
        );
}

/* =========================
   LOGO
========================= */

.logo-area{

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    margin-bottom:25px;
}

.logo{

    width:220px;

    max-width:80%;

    object-fit:contain;

    filter:
        drop-shadow(0 6px 12px rgba(0,0,0,.12));

    transition:.25s ease;
}

.logo:hover{
    transform:scale(1.02);
}

/* =========================
   TITULOS
========================= */

h2{

    text-align:center;

    font-size:32px;

    font-weight:700;

    margin-bottom:35px;

    color:#0f172a;
}

h3{

    margin-bottom:15px;

    color:#0f172a;
}

/* =========================
   LABELS
========================= */

label{

    display:block;

    margin-top:18px;
    margin-bottom:8px;

    font-size:14px;

    font-weight:600;

    color:#334155;
}

/* =========================
   TEXTO AUXILIAR
========================= */

.info-anexo{

    margin-top:-2px;

    margin-bottom:12px;

    font-size:12px;

    line-height:1.5;

    color:#64748b;

    font-style:italic;
}

/* =========================
   INPUTS
========================= */

input,
select,
textarea{

    width:100%;

    padding:14px 16px;

    border-radius:14px;

    border:1px solid #dbe2ea;

    background:#f8fafc;

    font-size:15px;

    font-family:'Inter',sans-serif;

    transition:.2s ease;

    outline:none;
}

input:focus,
select:focus,
textarea:focus{

    border-color:#3b82f6;

    background:#ffffff;

    box-shadow:
        0 0 0 4px rgba(59,130,246,.15);
}

/* =========================
   TEXTAREA
========================= */

textarea{

    resize:vertical;

    min-height:120px;
}

/* =========================
   BOTÕES
========================= */

button{

    width:100%;

    border:none;

    padding:16px;

    margin-top:28px;

    border-radius:16px;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    color:#ffffff;

    background:
        linear-gradient(
            135deg,
            #2563eb,
            #0ea5e9
        );

    transition:.25s ease;

    box-shadow:
        0 10px 25px rgba(37,99,235,.25);
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
        0 15px 35px rgba(37,99,235,.35);
}

/* =========================
   REVIEW BOX
========================= */

.review{

    display:none;

    margin-top:30px;

    background:#f8fafc;

    border:1px solid #e2e8f0;

    border-radius:20px;

    padding:25px;
}

pre{

    white-space:pre-wrap;

    line-height:1.7;

    font-size:14px;

    color:#334155;
}

/* =========================
   DIVIDER
========================= */

.divider{

    width:100%;

    height:1px;

    background:#e2e8f0;

    margin:30px 0;
}

/* =========================
   RESPONSIVO
========================= */

@media(max-width:768px){

    body{
        padding:20px 12px;
    }

    .container{
        padding:24px;
        border-radius:18px;
    }

    h2{
        font-size:24px;
    }

    .logo{
        width:180px;
    }

    input,
    select,
    textarea{
        font-size:14px;
    }

    button{
        font-size:15px;
    }
}

/* =========================
   ANIMAÇÃO
========================= */

.container,
.review{

    animation:fadeIn .4s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(12px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo-area">

        <img
            src="https://tukuz.com/wp-content/uploads/2021/06/inspired-education-logo-vector.png"
            alt="Inspired Education"
            class="logo"
        >

    </div>

    <h2>Abertura de Chamado – Suporte TI</h2>

    <label>Você é:</label>

    <select id="perfil" onchange="controlePerfil()">
        <option value="">Selecione</option>
        <option>Aluno</option>
        <option>Colaborador</option>
    </select>

    <label>E-mail institucional:</label>

    <input type="email" id="email">

    <label>Unidade:</label>

    <select id="unidade" onchange="controleUnidade()">
        <option value="">Selecione</option>
    </select>

    <div id="blocoSala">

        <label>Sala:</label>

        <div id="containerSala"></div>

    </div>

    <div id="camposAluno" style="display:none;">

        <label>Turma:</label>

        <input id="turmaAluno">

    </div>

    <div id="camposColaborador" style="display:none;">

        <label>Setor:</label>

        <select id="setor"></select>

    </div>

    <div class="divider"></div>

    <label>Equipamento / Solicitação:</label>

    <select id="equipamento"></select>

    <label>
    Descrição detalhada do problema (opcional):
</label>

<p class="info-anexo">
    Caso possua imagens ou evidências do problema,
    anexe os arquivos manualmente na janela do e-mail
    que será aberta.
</p>



    <textarea id="descricao"></textarea>

    <button type="button" onclick="gerarRevisao()">
        Revisar Chamado
    </button>

    <div class="review" id="revisao">

        <h3>Revisão do Chamado</h3>

        <pre id="resumo"></pre>

        <button type="button" onclick="enviarEmail()">
            Confirmar e Abrir Chamado
        </button>

    </div>

</div>

<script>

const unidades = [
    "Head Office Brazil",
    "Os Batutinhas",
    "Colégio Leonardo Da Vinci",
    "Eleva Botafogo",
    "Eleva Urca",
    "Eleva Barra da Tijuca",
    "Eleva Recife",
    "Eleva Brasília",
    "Eleva São Paulo",
    "Gurilândia Federação",
    "Gurilândia Pituba",
    "Land School Federação",
    "Land School Pituba"
];

const equipamentosAluno = [
    "Computador",
    "Chromebook",
    "iPad",
    "Internet",
    "Carregador",
    "Headset",
    "Agenda Edu, GSP, iSAMS, School Guardian ou Outro Sistema Educacional",
    "Outro"
];

const equipamentosColaboradorBase = [
    "Mouse",
    "Teclado",
    "Kit Mouse + Teclado",
    "Monitor",
    "Impressora",
    "Internet / Rede",
    "Pacote Office"
];

const equipamentosExtras = [
    "Computador",
    "Chromebook",
    "Projetor",
    "Som",
    "iPad",
    "Impressora",
    "Internet",
    "Carregador",
    "Telefone",
    "Headset",
    "Agenda Edu, GSP, iSAMS, School Guardian ou Outro Sistema Educacional",
    "Outro"
];

const salasRestritasAluno = [
    "Sala do Head Master",
    "Sala da Coordenação",
    "Sala da Coordenação do Infantil",
    "Sala dos Professores",
    "Sala dos Professores - Mezanino",
    "Recepção do Infantil",
    "Recepção Principal",
    "Birô",
    "Enfermaria"
];

function gerar(prefixo, ini, fim){

    return Array.from(
        {length:fim-ini+1},
        (_,i)=>prefixo+String(ini+i).padStart(2,"0")
    );
}

function salasPorUnidade(unidade){

    if(unidade==="Eleva Botafogo") return [
        "Auditório Multiuso",
        "Auditório Vermelho",
        "Biblioteca Infantil",
        "Biblioteca Principal",
        "Birô de Impressões",
        "Enfermaria",
        "Maker Space",
        "Maker Space - Fund. I - Mezanino",
        "Maker Space Infantil / Sala do Tatame",
        "Recepção do Infantil",
        "Recepção Principal",
        "Sala de Artes - Escada Monstro",
        "Sala de Artes - Prédio Anexo",
        "Sala de Música - Infantil",
        "Sala de Música - Mezanino",
        "Sala de Música - Prédio Anexo",
        "Sala do Diretor",
        "Sala da Coordenação - Fund. I",
        "Sala da Coordenação do Fund. II",
        "Sala da Coordenação do Infantil",
        "Sala dos Professores - Fund. I - Mezanino",
        "Sala dos Professores - Fund. II",
        "LAB 01",
        "LAB 02",
        "LAB 03 - Prédio Anexo",
        "LAB 04 - Prédio Anexo",
        ...gerar("A",1,16),
        ...gerar("B",1,36),
        ...gerar("C",1,5),
        ...gerar("D",1,10)
    ];

    return null;
}

function controlePerfil(){

    unidade.innerHTML =
        "<option value=''>Selecione</option>";

    unidades.forEach(u=>{
        unidade.innerHTML += `<option>${u}</option>`;
    });

    camposAluno.style.display =
        perfil.value==="Aluno" ? "block" : "none";

    camposColaborador.style.display =
        perfil.value==="Colaborador" ? "block" : "none";

    equipamento.innerHTML =
        "<option value=''>Selecione</option>";

    if(perfil.value==="Aluno"){

        equipamentosAluno.forEach(e=>{
            equipamento.innerHTML += `<option>${e}</option>`;
        });

    }else{

        [...new Set([
            ...equipamentosColaboradorBase,
            ...equipamentosExtras
        ])].forEach(e=>{
            equipamento.innerHTML += `<option>${e}</option>`;
        });
    }
}

function controleUnidade(){

    containerSala.innerHTML = "";
    setor.innerHTML = "";

    if(unidade.value==="Head Office Brazil"){

        blocoSala.style.display="none";

        [
            "Admissões",
            "Administração",
            "Finanças",
            "Jurídico",
            "Marketing",
            "Operações",
            "Pedagógico/ Enhancement",
            "RH - Recursos Humanos",
            "TI - Tecnologia da Informação"
        ].forEach(s=>{
            setor.innerHTML += `<option>${s}</option>`;
        });

        return;
    }

    blocoSala.style.display="block";

    const salas = salasPorUnidade(unidade.value);

    if(salas){

        let listaFinal = salas;

        if(perfil.value==="Aluno"){

            listaFinal = salas.filter(
                s => !salasRestritasAluno.includes(s)
            );
        }

        let html =
            "<select id='sala'><option value=''>Selecione</option>";

        listaFinal.forEach(s=>{
            html += `<option>${s}</option>`;
        });

        containerSala.innerHTML =
            html + "</select>";

    }else{

        containerSala.innerHTML =
            "<input id='sala'>";
    }

    if(perfil.value==="Colaborador"){

        [
            "Professor",
            "Coordenação",
            "Operações",
            "Administração",
            "Diretoria",
            "Secretaria"
        ].forEach(s=>{
            setor.innerHTML += `<option>${s}</option>`;
        });
    }
}

function extrairNome(email){

    return email
        .split("@")[0]
        .replace(/[._]/g," ")
        .replace(/\b\w/g,l=>l.toUpperCase());
}

function gerarRevisao(){

    const nome =
        extrairNome(email.value);

    const sala =
        document.getElementById("sala")?.value || "N/A";

    let texto =
`Perfil: ${perfil.value}
Nome: ${nome}
E-mail: ${email.value}
Unidade: ${unidade.value}`;

    if(unidade.value !== "Head Office Brazil"){
        texto += `\nSala: ${sala}`;
    }

    if(perfil.value==="Aluno"){

        texto += `\nTurma: ${turmaAluno.value || "N/A"}`;

    }else{

        texto += `\nSetor: ${setor.value || "N/A"}`;
    }

    texto += `
Equipamento: ${equipamento.value}

Descrição:
${descricao.value || "Não informada"}`;

    resumo.textContent = texto;

    revisao.style.display = "block";

    revisao.scrollIntoView({
        behavior:"smooth"
    });
}

function isMobile(){

    return /Android|iPhone|iPad|iPod/i.test(
        navigator.userAgent
    );
}

function enviarEmail(){

    const assunto =
        `${unidade.value} – ${equipamento.value} – ${extrairNome(email.value)}`;

    const corpo =
        encodeURIComponent(resumo.textContent);

    const plataformasTE = [
        "Agenda Edu, GSP, iSAMS, School Guardian ou Outro Sistema Educacional"
    ];

    const destino = plataformasTE.includes(equipamento.value)
        ? "analistas.te@escolaeleva.com.br"
        : "it.support@inspirededu.com";

    if(isMobile()){

        window.location.href =
            `mailto:${destino}?subject=${encodeURIComponent(assunto)}&body=${corpo}`;

        return;
    }

    const emailUser =
        email.value.toLowerCase();

    const usarGmail =
        perfil.value==="Aluno" ||
        emailUser.endsWith("@alunoeleva.com.br") ||
        emailUser.endsWith("@escolaeleva.com.br") ||
        emailUser.endsWith("@osbatutinhas.com.br") ||
        emailUser.endsWith("@landschool.com.br");

    if(usarGmail){

        window.open(
            `https://mail.google.com/mail/?view=cm&to=${destino}&su=${encodeURIComponent(assunto)}&body=${corpo}`,
            "_blank"
        );

    }else{

        window.open(
            `https://outlook.office.com/mail/deeplink/compose?to=${destino}&subject=${encodeURIComponent(assunto)}&body=${corpo}`,
            "_blank"
        );
    }
}

</script>

</body>
</html>
